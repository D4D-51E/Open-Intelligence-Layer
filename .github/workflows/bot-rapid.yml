name: bot-rapid

# DISABLED: live service shut down after the hackathon (2026-07). Rapid Telegram alerts
# (anomalous aircraft + air-raid/interception sirens) no longer poll automatically. Kept as
# workflow_dispatch-only for manual reproduction. Dedup remains server-side (bot_push_log).
on:
  workflow_dispatch: {}

jobs:
  rapid:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger anomaly + alert push
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "CRON_SECRET not set" >&2; exit 1; fi
          curl -fsS --max-time 60 -H "authorization: Bearer $CRON_SECRET" "https://d4d.n2f.site/api/tg?push=anomaly" || true
          curl -fsS --max-time 60 -H "authorization: Bearer $CRON_SECRET" "https://d4d.n2f.site/api/tg?push=alert" || true
