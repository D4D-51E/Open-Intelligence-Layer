name: record-vessels

# DISABLED: superseded by the always-on Railway collector (collector/), which ingests global
# AIS continuously. The scheduled trigger is removed to avoid redundant writes; kept as
# workflow_dispatch only so it can still be run manually as a fallback if the collector is down.
on:
  workflow_dispatch: {}

jobs:
  vessels:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel vessel (AIS) endpoint
        env:
          RECORD_URL: ${{ secrets.RECORD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$RECORD_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "RECORD_URL / CRON_SECRET repo secrets are not set" >&2
            exit 1
          fi
          VESSELS_URL="${RECORD_URL%record}record-vessels"
          curl -fsS --max-time 120 -H "authorization: Bearer $CRON_SECRET" "$VESSELS_URL"
