name: record-vessels

# AIS vessel positions refresh on a tighter cadence than the main observation pass
# (record-observations.yml, */15) since vessels are the only recorder-bound live layer
# whose freshness users notice (aircraft are polled live in the browser). Vercel Hobby
# Cron is daily-only, so this runs here. GitHub's minimum schedule interval is 5 minutes;
# scheduled runs may be delayed under load.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  vessels:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel vessel (AIS) endpoint
        env:
          RECORD_URL: ${{ secrets.RECORD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$RECORD_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "RECORD_URL / CRON_SECRET repo secrets are not set" >&2
            exit 1
          fi
          VESSELS_URL="${RECORD_URL%record}record-vessels"
          curl -fsS --max-time 120 -H "authorization: Bearer $CRON_SECRET" "$VESSELS_URL"
