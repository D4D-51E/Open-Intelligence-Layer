name: record-observations

# DISABLED: live service shut down after the hackathon (2026-07). The 15-minute observation
# writer no longer runs automatically to avoid ongoing Neon compute/storage cost. Kept as
# workflow_dispatch-only so ingestion can still be reproduced manually. See README "DB 연동".
on:
  workflow_dispatch: {}

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel record endpoint
        env:
          RECORD_URL: ${{ secrets.RECORD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$RECORD_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "RECORD_URL / CRON_SECRET repo secrets are not set" >&2
            exit 1
          fi
          curl -fsS --max-time 290 -H "authorization: Bearer $CRON_SECRET" "$RECORD_URL"
