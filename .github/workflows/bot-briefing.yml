name: bot-briefing

# DISABLED: live service shut down after the hackathon (2026-07). The 6-hour UA·ME conflict
# briefing no longer pushes automatically. Kept as workflow_dispatch-only for manual reproduction.
on:
  workflow_dispatch: {}

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger briefing push
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then echo "CRON_SECRET not set" >&2; exit 1; fi
          curl -fsS --max-time 90 -H "authorization: Bearer $CRON_SECRET" \
            "https://d4d.n2f.site/api/tg?push=briefing"
